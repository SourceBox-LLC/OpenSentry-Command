# fly.toml app configuration file generated for SourceBox Sentry Command
#
# See https://fly.io/docs/reference/configuration/ for information about settings

app = "opensentry-command"
primary_region = "sjc"

[build]

[env]
  FRONTEND_URL = "https://opensentry-command.fly.dev"
  DATABASE_URL = "sqlite:////data/opensentry.db"

[[mounts]]
  source = "opensentry_data"
  destination = "/data"

[deploy]
  # Single machine + single persistent volume (`opensentry_data` at
  # /data, holding the SQLite DB).  Rolling deploys can't work here
  # — there's only one volume attachment slot, so a new machine
  # cannot be brought up alongside the old one (Fly errors with
  # "creating a new machine in group 'app' requires an unattached
  # 'opensentry_data' volume").
  #
  # `immediate` tells Fly to stop the existing machine, free the
  # volume, and reattach it to the new machine on the same deploy.
  # Cost: ~30-60s of downtime per deploy.
  #
  # NOTE: `max_unavailable` is rolling-only — flyctl warns and
  # ignores it under `immediate`, so don't add it back.
  #
  # The path to zero-downtime deploys is migrating off
  # SQLite-on-a-single-volume (Postgres or LiteFS).
  strategy = "immediate"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "10s"
    timeout = "5s"
    method = "GET"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024